name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/padelclaw/app
            git fetch --all --prune
            git checkout main
            git pull origin main
            if [ -f /opt/padelclaw/.env.prod ]; then
              cp /opt/padelclaw/.env.prod .env.prod
            fi
            if command -v git >/dev/null 2>&1; then
              export APP_VERSION="$(git rev-parse --short HEAD)"
              if grep -q '^APP_VERSION=' .env.prod; then
                sed -i "s/^APP_VERSION=.*/APP_VERSION=${APP_VERSION}/" .env.prod
              else
                printf '\nAPP_VERSION=%s\n' "${APP_VERSION}" >> .env.prod
              fi
            fi
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
            sleep 10
            curl --fail --silent http://localhost/healthz >/dev/null

      - name: Health check
        run: curl --fail --silent --resolve padelclaw.ai:443:${{ secrets.VPS_HOST }} https://padelclaw.ai/api/health >/dev/null
